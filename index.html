<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitRadar Berlin</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
</head>
<body>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search station..."
        >
        <div id="searchResults"></div>
    </div>

    <div class="filter-control">
        <button id="filterToggle" class="filter-toggle">
            ⚙ Filter
        </button>

        <div id="filterPanel" class="filter-panel">
            <div class="filter-panel-title">Filter</div>

            <button class="filter-option active" data-filter="all">Alle</button>
            <button class="filter-option" data-filter="suburban">S-Bahn</button>
            <button class="filter-option" data-filter="subway">U-Bahn</button>
            <button class="filter-option" data-filter="surface">Bus / Tram</button>
        </div>
    </div>

    <div id="map"></div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <script type="module" src="./js/main.js"></script>

</body>
</html>
