<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitRadar Berlin</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
</head>
<body>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search station..."
        >
        <div id="searchResults"></div>
    </div>

    <div class="filter-bar">
        <button class="filter-button active" data-filter="all">All</button>
        <button class="filter-button" data-filter="suburban">S</button>
        <button class="filter-button" data-filter="subway">U</button>
        <button class="filter-button" data-filter="surface">Bus / Tram</button>
    </div>

    <div id="map"></div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <script type="module" src="./js/main.js"></script>

</body>
</html>
