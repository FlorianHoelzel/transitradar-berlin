<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitRadar Berlin</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
</head>
<body>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search station..."
        >
        <div id="searchResults"></div>
    </div>

    <div class="filter-control">
        <button id="filterToggle" class="filter-toggle">
            ⚙ Filters
        </button>

        <div id="filterPanel" class="filter-panel">
            <div class="filter-section">
                <div class="filter-panel-title">Stations</div>

                <button class="filter-option active" data-filter-group="stations" data-filter="suburban">
                    S-Bahn
                </button>

                <button class="filter-option active" data-filter-group="stations" data-filter="subway">
                    U-Bahn
                </button>

                <button class="filter-option active" data-filter-group="stations" data-filter="surface">
                    Bus / Tram
                </button>
            </div>

            <div class="filter-section">
                <div class="filter-panel-title">Live Vehicles</div>

                <button class="filter-option active" data-filter-group="vehicles" data-filter="suburban">
                    S-Bahn
                </button>

                <button class="filter-option active" data-filter-group="vehicles" data-filter="subway">
                    U-Bahn
                </button>

                <button class="filter-option active" data-filter-group="vehicles" data-filter="surface">
                    Bus / Tram
                </button>

                <button class="filter-option active" data-filter-group="vehicles" data-filter="regional">
                    RE / RB / RJ / FEX
                </button>

                <button class="filter-option active" data-filter-group="vehicles" data-filter="longDistance">
                    ICE / IC / EC
                </button>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <script type="module" src="./js/main.js"></script>

</body>
</html>
